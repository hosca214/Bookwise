version: "1"
base_url: https://bookwise-coral.vercel.app
credentials:
  email: demo@bookwise.app
  password: Demo2025!
screenshot_dir: /tmp/bookwise-smoke
log_lookback_seconds: 120

tests:

  - id: landing-load
    name: Landing page loads
    url: /landing
    steps:
      - action: navigate
      - action: screenshot
        filename: landing-load.png
    assertions:
      - selector: "nav"
        type: visible
      - text: "Sign In"
        type: present
      - text: "How it works"
        type: present
      - text: "Pricing"
        type: present

  - id: landing-nav
    name: Landing page anchor navigation
    url: /landing
    steps:
      - action: navigate
      - action: click
        target: "a[href='#how-it-works']"
        description: Click How it works anchor
      - action: screenshot
        filename: landing-nav-how-it-works.png
      - action: navigate
        url: /landing
      - action: click
        target: "a[href='#pricing']"
        description: Click Pricing anchor
      - action: screenshot
        filename: landing-nav-pricing.png
    assertions:
      - text: "How it works"
        type: present
        after_step: 2
      - text: "Pricing"
        type: present
        after_step: 4

  - id: sign-in-flow
    name: Sign-in page renders and accepts input
    url: /login
    steps:
      - action: navigate
      - action: screenshot
        filename: sign-in-initial.png
      - action: fill
        selector: "input[type='email']"
        value: demo@bookwise.app
      - action: fill
        selector: "input[type='password']"
        value: Demo2025!
      - action: screenshot
        filename: sign-in-filled.png
    assertions:
      - selector: "input[type='email']"
        type: visible
      - selector: "input[type='password']"
        type: visible
      - selector: "button[type='submit']"
        type: visible
      - text: "Google"
        type: present

  - id: dashboard-load
    name: Dashboard renders past skeleton within 5s
    url: /login
    timeout_ms: 5000
    steps:
      - action: navigate
      - action: fill
        selector: "input[type='email']"
        value: demo@bookwise.app
      - action: fill
        selector: "input[type='password']"
        value: Demo2025!
      - action: click
        selector: "button[type='submit']"
        description: Submit sign-in form
      - action: wait_for_url
        pattern: /dashboard
        timeout_ms: 8000
      - action: wait_for_no_skeleton
        timeout_ms: 5000
        description: Wait until loading skeletons disappear
      - action: screenshot
        filename: dashboard-loaded.png
    assertions:
      - url_contains: /dashboard
      - selector: "[data-testid='dashboard'],.dashboard,[class*='dashboard']"
        type: one_present
        description: At least one dashboard container element is visible
      - skeleton_absent: true
        description: No skeleton/shimmer loaders present after 5s

  - id: ledger-page
    name: Ledger page loads with transaction list
    url: /ledger
    requires_auth: true
    steps:
      - action: navigate
        note: Must run after dashboard-load (session cookie carries over)
      - action: screenshot
        filename: ledger-load.png
      - action: wait_for_content
        timeout_ms: 5000
        description: Wait for ledger content to replace skeleton
      - action: screenshot
        filename: ledger-loaded.png
    assertions:
      - url_contains: /ledger
      - selector: "table,ul,[class*='ledger'],[class*='transaction']"
        type: one_present
        description: Transaction list or table element is rendered
      - skeleton_absent: true
